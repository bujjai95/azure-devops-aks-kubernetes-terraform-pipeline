trigger:
- main

pool:
  name: default

variables:
- name: DEV_ENVIRONMENT
  value: dev 

stages:

# =========================
# Stage 1: Validate
# =========================
- stage: TerraformValidate
  displayName: Terraform Validate Stage

  jobs:
  - job: TerraformValidateJob
    displayName: Terraform Validate Job

    steps:
    - checkout: self

    # Debug
    - script: |
        echo "Checking load_balancer_sku value..."
        grep -i load_balancer_sku terraform-manifests/07-aks-cluster.tf
      displayName: Debug Terraform File

    - script: terraform version
      displayName: Check Terraform Version

    # Run Terraform inside AzureCLI (IMPORTANT)
    - task: AzureCLI@2
      displayName: Terraform Init & Validate
      inputs:
        azureSubscription: terraform-aks-azurerm-svc-con
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account show

          terraform init -reconfigure \
            -backend-config="resource_group_name=terraform-storage-rg" \
            -backend-config="storage_account_name=goginenigirishstorage" \
            -backend-config="container_name=tfstatefiles" \
            -backend-config="key=aks-$(DEV_ENVIRONMENT).tfstate"

          chmod -R +x .terraform/providers

          terraform validate
          workingDirectory: terraform-manifests

    # Publish artifact
    - task: PublishPipelineArtifact@1
      displayName: Publish Artifacts
      inputs:
        targetPath: terraform-manifests
        artifact: terraform-manifests-out


# =========================
# Stage 2: Deploy
# =========================
- stage: DeployAKSClusters
  displayName: Deploy AKS
  dependsOn: TerraformValidate

  jobs:
  - deployment: DeployDevAKSCluster
    displayName: Deploy Dev AKS Cluster
    pool:
      name: default
    environment: $(DEV_ENVIRONMENT)

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - task: DownloadPipelineArtifact@2
            displayName: Download Terraform Artifacts
            inputs:
              artifact: terraform-manifests-out
              path: $(Pipeline.Workspace)/terraform-manifests

          # Download SSH key
          - task: DownloadSecureFile@1
            displayName: Download SSH Key
            name: sshkey
            inputs:
              secureFile: 'aks-terraform-devops-ssh-key-ububtu.pub'

          - script: terraform version
            displayName: Verify Terraform

          # Terraform Plan (inside AzureCLI)
          - task: AzureCLI@2
            displayName: Terraform Plan
            inputs:
              azureSubscription: terraform-aks-azurerm-svc-con
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show

                terraform init -reconfigure \
                  -backend-config="resource_group_name=terraform-storage-rg" \
                  -backend-config="storage_account_name=goginenigirishstorage" \
                  -backend-config="container_name=tfstatefiles" \
                  -backend-config="key=aks-$(DEV_ENVIRONMENT).tfstate"

                chmod -R +x .terraform/providers

                terraform plan \
                  -var ssh_public_key=$(sshkey.secureFilePath) \
                  -var environment=$(DEV_ENVIRONMENT) \
                  -out=tfplan
                  workingDirectory: $(Pipeline.Workspace)/terraform-manifests

          # Terraform Apply (inside AzureCLI)
          - task: AzureCLI@2
            displayName: Terraform Apply
            inputs:
              azureSubscription: terraform-aks-azurerm-svc-con
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                terraform apply -auto-approve tfplan
                 workingDirectory: $(Pipeline.Workspace)/terraform-manifests